name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and test tools
        run: python -m pip install . pytest build Cython

      - name: Build extensions in place
        run: python Cython_setup.py build_ext --inplace

      - name: Smoke imports
        run: python tools/dev/smoke_imports.py

      - name: Run tests
        run: python -m pytest -q

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload wheel artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: pyneutube-wheel-py${{ matrix.python-version }}
          path: dist/*.whl
