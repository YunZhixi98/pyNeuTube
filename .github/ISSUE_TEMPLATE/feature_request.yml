name: Feature request
description: Suggest an improvement to the public API, tracing pipeline, or packaging.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or inefficient today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the API, behavior, or documentation improvement you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include sample data shapes, file formats, performance constraints, or compatibility requirements.
